<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1>Dashboard</h1>

            <div class="tabs">
                <button class="tab active">Profile</button>
                <button class="tab">Tasks</button>
                <button class="tab">Settings</button>
            </div>

            <div class="content">

                <div class="panel active">
                    <h2>Profile</h2>
                    <p>This is the profile section.</p>
                </div>

                <div class="panel">
                    <h2>Tasks</h2>
                    <p>This is the tasks section.</p>
                </div>

                <div class="panel">
                    <h2>Settings</h2>
                    <p>This is the settings section.</p>
                </div>

            </div>

        </div>
        <script src="index.js"></script>
    </body>
</html>
